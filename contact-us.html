<!DOCTYPE hmtl>
<html>
    <head>
        <title>contact-us</title>
        <meta charset="UTF-8">
        <meta name="author" content="joseph">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <meta name="description" content="e-commerce">
        <style>
            div{
                width:100%;
                height:900px;
                background:green;
                display:flex;
                background: url(backg1.jpg) no-repeat;
                background-size:cover;
                background-position:center;
                flex-wrap: wrap;
            }

            fieldset{
                width:600px;
                height:500px;
                margin-left:450px;
                text-align: center;
                /* background:linear-gradient(rgb(0,0,0,0), rgb(0,0,0,0) ) ,url(img6.jpg);
                background-position:cover; */
                /* background-size:cover;  */
                /* color:white; */
                background-color:transparent;
                border-radius:2px solid  rgb(255,255,255.0.2); 
                backdrop-filter: blur(20px);
                box-shadow:0,0,10px rgb(0,0,0,0.3);

            }
            input{
                border-radius:40px;
                width:35%;
                height:29px ;
                background:rgb(255,255,255,0.8)
            }
        </style>
        
    </head>
    <body>
        <div>
           <form method="GET" action="">
            <fieldset>
                <legend style="text-align:center;"><h3>User Registreation</h3></legend>
                <label  for="fname">Name</label>
                <input type="text" id="fname" name="name" value="" autofocus required="required" placeholder="Enter name" style=background:rgba(255,255,255,0.8)><br><br>
                <label for="em">Email</label>
                <input type="email" id="em" name="email" value="" required="required" style=background:rgba(255,255,255,0.8) placeholder="Enter Email"><br><br>
                <label for="pw">password</label>
                <input type="password" id="pw" name="password" value="" required="required" style=background:rgba(255,255,255,0.8) placeholder="Enter password of atmost 10" max length="10"><br><br>
                <label for="gd">Gender</label>
                <input type="radio" id="gd" name="gender">male<input type="radio" id="gd" name="gender">female<br><br>
                <label for="description" class="mydesc" >Describe your cake order</label>
                <textarea col="15" rows="7" maxlength="300" id="inquiry">cake order description</textarea><br><br>
                <input id="submit" type="submit" name="submit" value="Register" onclick="registerfunction()">
                
            </fieldset>

           </form>
        <script>
            function registerfunction(){
                window.alert("Thank you for contacting-us");
            }
        </script>

        </div>
       
    </body>
</html>
